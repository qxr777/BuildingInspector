<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<body>
    <nav class="navbar">

            <li>关于我们</li>
        </ul>
        <div class="cart-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>

    <main class="product-container">
        <div class="product-grid">
            <div class="product-gallery">
                <div class="main-image-container">
                    <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?auto=format&fit=crop&w=800&q=80" alt="回力帆布鞋" id="main-product-image">
                </div>
                <div class="thumbnail-list">
                    <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?auto=format&fit=crop&w=200&q=80" class="thumb active" alt="图1">
                    <img src="https://images.unsplash.com/photo-1544441893-675973e31985?auto=format&fit=crop&w=200&q=80" class="thumb" alt="图2">
                    <img src="https://images.unsplash.com/photo-1512374382149-4332c6c021f1?auto=format&fit=crop&w=200&q=80" class="thumb" alt="图3">

            <div class="product-info">

                <p class="product-subtitle">轻便透气 · 海波丽减震 · 防滑大底</p>
                
                <div class="price-section">
                    <span class="currency">¥</span>
                    <span class="price">35.00</span>
                    <span class="old-price">¥59.00</span>
                    <div class="promo-tag">满2双享8.5折</div>
                </div>

                <div class="selection-group">
                    <label>选择颜色</label>
                    <div class="color-options">
                        <div class="color-circle active" style="background: #fff; border: 1px solid #ddd;" title="白色"></div>
                        <div class="color-circle" style="background: #e63946;" title="经典红"></div>
                        <div class="color-circle" style="background: #1d3557;" title="复古蓝"></div>
                    </div>
                </div>

                <div class="selection-group">
                    <label>选择尺码</label>
                    <div class="size-options">
                        <div class="size-chip">35</div>
                        <div class="size-chip active">36</div>
                        <div class="size-chip">37</div>
                        <div class="size-chip">38</div>
                        <div class="size-chip">39</div>
                        <div class="size-chip">40</div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" id="add-to-cart-btn">加入购物车</button>
                    <button class="btn btn-outline">立即购买</button>

                    </div>
                    <div class="feature-item">
