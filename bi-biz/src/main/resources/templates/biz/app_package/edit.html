<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('编辑移动端安装包')" />
    <th:block th:include="include :: bootstrap-fileinput-css"/>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-app-package-edit" enctype="multipart/form-data">
        <input name="id" th:field="*{appPackage.id}" type="hidden">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">app版本号：</label>
            <div class="col-sm-8">
                <input name="version" th:field="*{appPackage.version}" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">更新备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control" rows="4" th:field="*{appPackage.remark}"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">当前文件：</label>
            <div class="col-sm-8">
                <p class="form-control-static" th:text="*{appPackage.apkName}"></p>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">app文件：</label>
            <div class="col-sm-8">
                <input type="file" name="file" class="file-loading">
                <span class="help-block m-b-none"><i class="fa fa-info-circle"></i> 不上传新文件时保留原 APK</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">是否发布：</label>
            <div class="col-sm-8">
                <label class="radio-box">
                    <input type="radio" name="isPublish" value="1" th:field="*{appPackage.isPublish}"> 是
                </label>
                <label class="radio-box">
                    <input type="radio" name="isPublish" value="0" th:field="*{appPackage.isPublish}"> 否
                </label>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: bootstrap-fileinput-js"/>
<script th:inline="javascript">
    var prefix = ctx + "biz/appPackage";

    $(function () {
        $("input[name='file']").fileinput({
            'theme': 'fa',
            'uploadUrl': '#',
            showPreview: false,
            showUpload: false,
            allowedFileExtensions: ['apk'],
            elErrorContainer: '#errorBlock'
        });
    });

    $("#form-app-package-edit").validate({
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            var formData = new FormData($("#form-app-package-edit")[0]);
            $.ajax({
                url: prefix + "/edit",
                type: 'post',
                cache: false,
                data: formData,
                processData: false,
                contentType: false,
                dataType: "json",
                beforeSend: function () {
                    $.modal.loading("正在处理，请稍候...");
                    $.modal.disable();
                },
                success: function(result) {
                    $.operate.successCallback(result);
                }
            });
        }
    }
</script>
</body>
</html>
