<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('移动端安装包')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="formId">
                <div class="select-list">
                    <ul>
                        <li>
                            <label>版本号：</label>
                            <input type="text" name="version"/>
                        </li>
                        <li>
                            <label>APK名称：</label>
                            <input type="text" name="apkName"/>
                        </li>
                        <li>
                            <label>发布状态：</label>
                            <select name="isPublish">
                                <option value="">所有</option>
                                <option value="1">已发布</option>
                                <option value="0">未发布</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="biz:appPackage:add">
                <i class="fa fa-plus"></i> 新增
            </a>
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="biz:appPackage:edit">
                <i class="fa fa-edit"></i> 编辑
            </a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="biz:appPackage:remove">
                <i class="fa fa-remove"></i> 删除
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('biz:appPackage:edit')}]];
    var removeFlag = [[${@permission.hasPermi('biz:appPackage:remove')}]];
    var downloadFlag = [[${@permission.hasPermi('biz:appPackage:download')}]];
    var prefix = ctx + "biz/appPackage";

    $(function() {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            modalName: "移动端安装包",
            columns: [{
                checkbox: true
            },
            {
                field: 'id',
                title: 'ID',
                visible: false
            },
            {
                field: 'version',
                title: '版本号'
            },
            {
                field: 'apkName',
                title: 'APK名称'
            },
            {
                field: 'packageSize',
                title: '包大小'
            },
            {
                field: 'isPublish',
                title: '发布状态',
                formatter: function(value) {
                    return value === '1'
                        ? '<span class="badge badge-primary">已发布</span>'
                        : '<span class="badge badge-default">未发布</span>';
                }
            },
            {
                field: 'remark',
                title: '更新备注',
                formatter: function(value) {
                    return $.table.tooltip(value, 30, 'open');
                }
            },
            {
                field: 'createTime',
                title: '上传时间'
            },
            {
                field: 'updateTime',
                title: '更新时间'
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row) {
                    var actions = [];
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                    actions.push('<a class="btn btn-info btn-xs ' + downloadFlag + '" href="javascript:void(0)" onclick="downloadApk(\'' + row.id + '\')"><i class="fa fa-download"></i>下载</a> ');
                    actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });

    function downloadApk(id) {
        window.location.href = prefix + "/download/" + id;
    }
</script>
</body>
</html>
