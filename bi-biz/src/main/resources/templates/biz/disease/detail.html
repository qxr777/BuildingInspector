<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('з—…е®іиҜҰжғ…дҝЎжҒҜ')"/>
    <th:block th:include="include :: select2-css"/>
</head>
<body>
<div class="main-content">
    <form
            class="form-horizontal m"
            id="form-disease-edit"
            th:object="${disease}"
    >
        <input name="id" type="hidden" th:field="*{id}"/>
        <h4 class="form-header h4">еҹәжң¬дҝЎжҒҜ</h4>
        <!-- з—…е®іеҹәжң¬дҝЎжҒҜ -->
        <div class="row mb-4">
            <div class="col-sm-4">
                <div class="form-group" style="margin-bottom: 20px">
                    <label class="col-sm-4 control-label is-required"
                    >жһ„д»¶еҗҚз§°пјҡ</label
                    >
                    <div class="col-sm-8">
                        <input
                                class="form-control"
                                type="text"
                                th:if="${biObject.name == 'е…¶д»–'}"
                                name="biObjectName"
                                th:value="*{biObjectName}"
                                required
                                readonly
                        />
                        <input
                                class="form-control"
                                type="text"
                                th:if="${biObject.name != 'е…¶д»–'}"
                                name="biObjectName"
                                th:value="*{biObjectName}"
                                readonly
                                required
                        />
                        <input
                                type="hidden"
                                name="biObjectId"
                                th:value="${biObject.id}"
                                readonly
                        />
                    </div>
                </div>
            </div>

            <div class="col-sm-4">
                <div class="form-group" style="margin-bottom: 20px">
                    <label class="col-sm-4 control-label is-required">з—…е®іеҲҶз»„пјҡ</label>
                    <div class="col-sm-8">
                        <select class="form-control select2" name="diseaseGroupName" id="diseaseGroupName"
                                required disabled>
                            <option value="">иҜ·йҖүжӢ©з—…е®іеҲҶз»„</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group" style="margin-bottom: 20px">
                    <label class="col-sm-4 control-label">дҪҚзҪ®еәҸеҸ·пјҡ</label>
                    <div class="col-sm-8">
                        <input
                                class="form-control"
                                type="text"
                                name="positionNumber"
                                th:field="*{positionNumber}"
                                id="positionNumber"
                                placeholder="з¬¬xеҸ·"
                                readonly
                        />
                    </div>
                </div>
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-sm-4">
                <div class="form-group" style="margin-bottom: 20px">
                    <label class="col-sm-4 control-label">жһ„д»¶зј–з Ғпјҡ</label>
                    <div class="col-sm-8">
                        <input
                                name="cosmponent.code"
                                class="form-control"
                                type="text"
                                th:field="*{component.code}"
                                placeholder="иҜ·иҫ“е…Ҙжһ„д»¶зј–з Ғ"
                                readonly
                        />
                    </div>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group" style="margin-bottom: 20px">
                    <label class="col-sm-4 control-label is-required"
                    >з—…е®ізұ»еһӢпјҡ</label
                    >
                    <div class="col-sm-8">
                        <select
                                class="form-control select2"
                                name="diseaseTypeId"
                                id="diseaseTypeId"
                                required
                                th:field="*{diseaseTypeId}"
                                readonly
                                disabled
                        >
                            <option value="">иҜ·йҖүжӢ©з—…е®ізұ»еһӢ</option>
                        </select>
                        <input
                                type="text"
                                class="form-control"
                                id="customDiseaseType"
                                name="type"
                                th:field="*{type}"
                                placeholder="иҜ·иҫ“е…ҘиҮӘе®ҡд№үз—…е®ізұ»еһӢ"
                                style="display: none"
                                readonly
                        />
                    </div>
                </div>
            </div>

            <div class="col-sm-4">
                <div class="form-group" style="margin-bottom: 20px">
                    <label class="col-sm-4 control-label">з—…е®ідҪҚзҪ®пјҡ</label>
                    <div class="col-sm-8">
                        <select
                                class="form-control select2"
                                name="position"
                                id="position"
                                placeholder="иҜ·йҖүжӢ©з—…е®ідҪҚзҪ®"
                                required
                                disabled
                        >
                            <option value="">иҜ·йҖүжӢ©з—…е®ідҪҚзҪ®</option>
                        </select>
                        <input
                                type="text"
                                class="form-control"
                                id="customPosition"
                                name="customPosition"
                                th:value="${customPosition}"
                                placeholder="иҜ·иҫ“е…ҘиҮӘе®ҡд№үз—…е®ідҪҚзҪ®"
                                style="display: none"
                                readonly
                        />
                    </div>
                </div>
            </div>
        </div>

        <h4 class="form-header h4">з—…е®іе®ҡйҮҸж•°жҚ®</h4>
        <div class="row mb-4">
            <div class="col-sm-3">
            </div>
            <div class="col-sm-3">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="col-sm-4 control-label is-required">зјәжҚҹж•°йҮҸ:</label>
                    <div class="col-sm-8">
                        <input name="quantity"
                               id="quantityInput"
                               class="form-control"
                               type="number"
                               min="1"
                               step="1"
                               required
                               th:field="*{quantity}"
                               oninput="validateQuantity(this)"
                               onblur="formatQuantity(this)"
                               style="width: 120px;"
                               readonly>
                        <div id="quantityError" class="invalid-feedback" style="display: none; color: red;"></div>
                    </div>
                </div>
            </div>
            <div class="col-sm-1">
            </div>
            <div class="col-sm-3">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="col-sm-3 control-label is-required">еҚ•дҪҚ:</label>
                    <div class="col-sm-9">
                        <select name="units" class="form-control" th:field="*{units}" style="width: 80px;" disabled>
                            <option value="жқЎ">жқЎ</option>
                            <option value="еӨ„">еӨ„</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-sm-3">
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-sm-12">
                <div class="form-group" id="diseaseDetails">
                    <!-- з—…е®іиҜҰжғ…ж•°жҚ®еЎ«еҶҷеҢәеҹҹ -->
                </div>
            </div>
        </div>
        <h4 class="form-header h4">з—…е®іе®ҡжҖ§ж•°жҚ®</h4>
        <div class="row mb-4" style="margin-top: 20px">

            <div class="col-sm-4">
                <div class="form-group" style="margin-top: 20px">
                    <label class="col-sm-4 control-label is-required"
                    >еҸ‘еұ•и¶ӢеҠҝпјҡ</label
                    >
                    <div class="col-sm-8">
                        <select
                                class="form-control no-select2"
                                name="developmentTrend"
                                id="developmentTrend"
                                required
                                th:field="*{developmentTrend}"
                                disabled
                        >
                            <option value="ж–°еўһ">ж–°еўһ</option>
                            <option value="зЁіе®ҡ">зЁіе®ҡ</option>
                            <option value="еҸ‘еұ•">еҸ‘еұ•</option>
                            <option value="е·Із»ҙдҝ®">е·Із»ҙдҝ®</option>
                            <option value="жңӘжүҫеҲ°">жңӘжүҫеҲ°</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group" style="margin-top: 20px">
                    <label class="col-sm-4 control-label is-required">з—…е®іжҖ§иҙЁпјҡ</label>
                    <div class="col-sm-8">
                        <select
                                class="form-control no-select2"
                                name="nature"
                                id="nature"
                                required
                                th:field="*{nature}"
                                disabled
                        >
                            <option value="йқһз»“жһ„з—…е®і">йқһз»“жһ„з—…е®і</option>
                            <option value="з»“жһ„з—…е®і">з»“жһ„з—…е®і</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group" style="margin-top: 20px">
                    <label class="col-sm-4 control-label is-required">жңҖеӨ§ж ҮеәҰпјҡ</label>
                    <div class="col-sm-8">
                        <input name="maxScale" class="form-control" type="text" id="maxScale"
                               th:field="*{diseaseType.maxScale}" readonly/>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-sm-4">
                <div class="form-group" style="margin-top: 20px">
                    <label class="col-sm-4 control-label is-required">еҸӮдёҺиҜ„е®ҡпјҡ</label>
                    <div class="col-sm-8">
                        <div class="btn-group" data-toggle="buttons">
                            <label
                                    class="btn btn-default"
                                    th:classappend="${disease.participateAssess == '1'} ? 'active'"
                            >
                                жҳҜ
                            </label>
                            <label
                                    class="btn btn-default"
                                    th:classappend="${disease.participateAssess == '0'} ? 'active'"
                            >
                                еҗҰ
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-sm-4" th:if="${biObject.name != 'е…¶д»–'}" style="margin-top: 20px">
                <div class="form-group">
                    <label class="col-sm-4 control-label is-required">иҜ„е®ҡж ҮеәҰпјҡ</label>
                    <div class="col-sm-8">
                        <div class="btn-group" id="levelGroup" data-toggle="buttons">
                            <!-- йҖүйЎ№е°ҶйҖҡиҝҮJavaScriptеҠЁжҖҒз”ҹжҲҗ -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="form-group" style="margin-top: 20px">
                    <label class="col-sm-4 control-label is-required">еӣҫзүҮзј–еҸ·пјҡ</label>
                    <div class="col-sm-8">
                        <input name="imgNoExp" class="form-control" type="text" id="imgNoExp"
                               th:field="*{imgNoExp}" readonly/>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-4" style="display: none;">
            <div class="form-group" style="margin-bottom: 20px">
                <label class="col-sm-4 control-label is-required">жһ„д»¶жүЈеҲҶпјҡ</label>
                <div class="col-sm-8">
                    <input name="deductPoints" class="form-control" type="text" id="deductPoints"
                           th:field="*{deductPoints}" readonly/>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-12" style="margin-bottom: 20px">
                <div class="form-group">
                    <label class="col-sm-1 control-label is-required">жҸҸиҝ°пјҡ</label>
                    <div class="col-sm-11">
                        <textarea name="description"
                                  id="description"
                                  required
                                  placeholder="иҜ·иҫ“е…Ҙз—…е®іжҸҸиҝ°"
                                  maxlength="500"
                                  class="form-control"
                                  rows="3"
                                  th:field="*{description}"
                                  readonly
                        ></textarea>
                    </div>
                </div>
            </div>
        </div>
        <h4 class="form-header h4">е…¶е®ғдҝЎжҒҜ</h4>
        <div class="row mb-4">
            <div class="col-sm-12">
                <div class="form-group">
                    <label class="col-sm-1 control-label">жҲҗеӣ пјҡ</label>
                    <div class="col-sm-11" style="display: flex; align-items: flex-start">
                        <textarea
                                id="causeAnalysisBox"
                                name="cause"
                                style="
                            flex: 1;
                            min-height: 120px;
                            border: 1px solid #ddd;
                            background: #fafbfc;
                            padding: 10px;
                            border-radius: 4px;
                            overflow-x: auto;
                            resize: vertical;
                          "
                                class="form-control"
                                rows="5"
                                readonly
                        ></textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-sm-12">
                <div class="form-group">
                    <label class="col-sm-1 control-label">еӨҮжіЁпјҡ</label>
                    <div class="col-sm-11">
                        <textarea
                                name="remark"
                                maxlength="500"
                                class="form-control"
                                rows="3"
                                th:field="*{remark}"
                                readonly
                        ></textarea>
                    </div>
                </div>
            </div>
        </div>
        <!-- ж–Үд»¶дёҠдј е’Ңйў„и§ҲеҢәеҹҹ -->
        <div class="row">
            <div class="col-sm-12">
                <div class="form-group">
                    <div>
                        <input
                                type="file"
                                name="attachmentFiles"
                                id="diseaseFiles"
                                class="d-none"
                                multiple
                                accept="*/*"
                                style="display: none"
                        />
                        <div id="filePreview" class="mt-2 row">
                            <!-- иҝҷйҮҢжҳҜж–Үд»¶йў„и§ҲеҢәеҹҹ,дјҡжҳҫзӨәе·ІдёҠдј зҡ„ж–Үд»¶е’Ңж–°дёҠдј зҡ„ж–Үд»¶ -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-offset-5 col-sm-10" style="margin-top: 20px">
                <button
                        type="button"
                        class="btn btn-sm btn-danger"
                        onclick="closeItem()"
                >
                    <i class="fa fa-reply-all"></i>е…і й—ӯ
                </button>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer"/>
<th:block th:include="include :: select2-js"/>
<!-- bootstrap-select -->
<script th:src="@{/js/bootstrap-select.min.js}"></script>
<!--<script th:src="@{/js/marked.min.js}"></script>-->
<script th:src="@{/js/i18n/defaults-zh_CN.min.js}"></script>
<script th:inline="javascript">
    var prefix = ctx + "biz/disease"
    var disease = [[${disease}]];
    var biObject = [[${biObject}]];
    var customPosition = [[${customPosition}]];
    var diseaseTypes;
    var positionObjects;

    // е…ЁеұҖеҸҳйҮҸпјҢеӯҳеӮЁжүҖжңүеӣҫзүҮзҡ„urlгҖҒж–Үд»¶еҗҚе’ҢеҪ“еүҚзҙўеј•
    var previewImageList = [];
    var previewImageIndex = 0;

    $(function () {
        // еҲқе§ӢеҢ–select2пјҢжҺ’йҷӨеёҰжңүno-select2зұ»зҡ„е…ғзҙ 
        $('select.select2').select2({
            placeholder: "иҜ·йҖүжӢ©",
            allowClear: true
        });

        // зЎ®дҝқеҸ‘еұ•и¶ӢеҠҝе’Ңз—…е®іжҖ§иҙЁдёӢжӢүжЎҶжӯЈзЎ®еҲқе§ӢеҢ–пјҢдёҚйңҖиҰҒй”ҖжҜҒselect2е®һдҫӢ
        // еӣ дёәжҲ‘д»¬е·Із»ҸеңЁHTMLдёӯж·»еҠ дәҶno-select2зұ»жқҘжҺ’йҷӨе®ғд»¬

        // йҮҚж–°з»‘е®ҡеҖјпјҢзЎ®дҝқйҖүйЎ№жҳҫзӨәжӯЈзЎ®
        if (disease && disease.developmentTrend) {
            $("#developmentTrend").val(disease.developmentTrend);
        } else {
            $("#developmentTrend").val("зЁіе®ҡ"); // и®ҫзҪ®й»ҳи®ӨеҖј
        }

        if (disease && disease.nature) {
            $("#nature").val(disease.nature);
        } else {
            $("#nature").val("йқһз»“жһ„з—…е®і"); // и®ҫзҪ®й»ҳи®ӨеҖј
        }

        // еҲқе§ӢеҢ–з—…е®ізұ»еһӢдёӢжӢүжЎҶ
        loadDiseaseTypes();
        // еҲқе§ӢеҢ–з—…е®ідҪҚзҪ®дёӢжӢүжЎҶ
        loadPositions();
        // еҲқе§ӢеҢ–иҜ„е®ҡж ҮеәҰ
        updateLevelGroup();
        // еҠ иҪҪе·ІдёҠдј зҡ„йҷ„д»¶
        loadExistingAttachments();
        // з—…е®іиҜҰжғ…еҢәеҲқе§ӢеҢ–еңЁloadDiseaseTypesзҡ„еӣһи°ғдёӯиҝӣиЎҢпјҢзЎ®дҝқз—…е®ізұ»еһӢж•°жҚ®е·ІеҠ иҪҪ

        if (disease.cause) {
            $("#causeAnalysisBox").html(disease.cause);
        }

        // зӣ‘еҗ¬з—…е®іеҲҶз»„йҖүжӢ©еҸҳеҢ–
        $("#diseaseGroupName").change(function () {
            var selectedGroupName = $(this).val();
            if (selectedGroupName) {
                // ж №жҚ®йҖүжӢ©зҡ„еҲҶз»„иҝҮж»Өз—…е®ізұ»еһӢ
                var filteredDiseaseTypes = diseaseTypes.filter(function (item) {
                    return item.groupName === selectedGroupName;
                });

                var options = '<option value="">иҜ·йҖүжӢ©з—…е®ізұ»еһӢ</option>';
                $.each(filteredDiseaseTypes, function (i, item) {
                    options += '<option value="' + item.id + '">' + item.code + '#' + item.name + '</option>';
                });
                $("#diseaseTypeId").html(options);
            } else {
                // еҰӮжһңжІЎжңүйҖүжӢ©еҲҶз»„пјҢжё…з©әз—…е®ізұ»еһӢ
                $("#diseaseTypeId").html('<option value="">иҜ·е…ҲйҖүжӢ©з—…е®іеҲҶз»„</option>');
            }
        });

        // з—…е®ізұ»еһӢиҮӘе®ҡд№үиҫ“е…ҘжҳҫзӨәйҡҗи—Ҹ
        $('#diseaseTypeId').on('change', function () {
            var selectedText = $(this).find('option:selected').text().trim();
            if (selectedText === "0.0.0.0-3#е…¶д»–пјҲжңҖеӨ§ж ҮеәҰ3пјү" || selectedText === "0.0.0.0-4#е…¶д»–пјҲжңҖеӨ§ж ҮеәҰ4пјү" || selectedText === "0.0.0.0-5#е…¶д»–пјҲжңҖеӨ§ж ҮеәҰ5пјү") {
                $('#customDiseaseType').show().attr('required', true).val(disease.type);
            } else {
                $('#customDiseaseType').hide().removeAttr('required').val('');
                var selectedId = $(this).val();
                if (selectedId) {
                    updateLevelGroup(selectedId);
                    var selectedType = diseaseTypes.find(function (item) {
                        return item.id == selectedId;
                    });
                    $('#maxScale').val(selectedType ? selectedType.maxScale : '');
                } else {
                    updateLevelGroup();
                }
            }

            // еҪ“з—…е®ізұ»еһӢж”№еҸҳж—¶пјҢж №жҚ®йҖүдёӯзұ»еһӢжӣҙж–°з—…е®іиҜҰжғ…жҳҫзӨәеӯ—ж®ө
            var quantity = $("#quantityInput").val();
            updateDiseaseDetails(quantity);
        });

        // з—…е®ідҪҚзҪ®иҮӘе®ҡд№үиҫ“е…ҘжҳҫзӨәйҡҗи—Ҹ
        $('#position').on('change', function () {
            var selectedText = $(this).find('option:selected').text().trim();
            if (selectedText === "е…¶д»–" || selectedText === "е…¶е®ғ") {
                $('#customPosition').show().attr('required', true).val(customPosition);
            } else {
                $('#customPosition').hide().removeAttr('required').val('');
            }
        });

        // ж•°йҮҸеҸҳеҢ–ж—¶жёІжҹ“з—…е®іиҜҰжғ…еҢә
        $('#quantityInput').on('change', function () {
            var quantity = $(this).val();
            updateDiseaseDetails(quantity);

            $("#position").val("").trigger("change");
            $("#customPosition").val("").hide().removeAttr('required');
        });

        // иЎЁеҚ•йӘҢиҜҒ
        $("#form-disease-edit").validate({
            rules: {
                componentId: "required",
                diseaseGroupName: "required",
                diseaseTypeId: "required",
                level: "required"
            },
            submitHandler: function (form) {
                // еӨ„зҗҶиҮӘе®ҡд№үеҸӮиҖғйқўдҪҚзҪ®
                var quantity = $("#quantityInput").val();

                // иҺ·еҸ–еҪ“еүҚйҖүдёӯзҡ„з—…е®ізұ»еһӢ
                var selectedDiseaseTypeId = $("#diseaseTypeId").val();
                var selectedDiseaseType = selectedDiseaseTypeId ? diseaseTypes.find(function (item) {
                    return item.id == selectedDiseaseTypeId;
                }) : null;

                // иҺ·еҸ–thresholdеҖјпјҢй»ҳи®Өдёә10
                var threshold = (selectedDiseaseType && selectedDiseaseType.threshold) ? selectedDiseaseType.threshold : 10;

                // еӨ„зҗҶеҚ•дёӘз—…е®ізҡ„жғ…еҶө
                if (quantity >= threshold) {
                    if ($("#reference1Location").val() === "е…¶д»–") {
                        var customValue = $("#reference1LocationCustom").val();
                        if (customValue) {
                            $("#reference1Location").val(customValue);
                        }
                    }
                    if ($("#reference2Location").val() === "е…¶д»–") {
                        var customValue = $("#reference2LocationCustom").val();
                        if (customValue) {

    function loadDiseaseTypes() {

    // жёІжҹ“з—…е®іиҜҰжғ…еҢә
    function updateDiseaseDetails(quantity) {
        var detailsContainer = $("#diseaseDetails");
        detailsContainer.empty();
        var isCustomPosition = (biObject.name === "е…¶д»–" || biObject.name === "е…¶е®ғ");

            return item.id == selectedDiseaseTypeId;

        // иҺ·еҸ–thresholdеҖјпјҢй»ҳи®Өдёә10
        var threshold = (selectedDiseaseType && selectedDiseaseType.threshold) ? selectedDiseaseType.threshold : 10;

        // и§ЈжһҗselectColumnеӯ—ж®өеҶіе®ҡжҳҫзӨәе“Әдәӣз—…е®іиҜҰжғ…еӯ—ж®ө

        var showDeformation = true;
        var showAngle = true;

                            }
                        }
                    }
                }
            }
        }
    }

    // и®Ўз®—жһ„д»¶жүЈеҲҶ
    function computeDeductPoints(maxScale, scale) {
        switch (parseInt(maxScale)) {
            case 3:
                switch (parseInt(scale)) {
                    case 1:
                        return 0;
                    case 2:
                        return 20;
                    case 3:
                        return 35;
                    default:
                        throw new Error("еҪ“ max_scale дёә 3 ж—¶пјҢscale еҸӘиғҪдёә 1гҖҒ2 жҲ– 3");
                }
            case 4:
                switch (parseInt(scale)) {
                    case 1:
                        return 0;
                    case 2:
                        return 25;
                    case 3:
                        return 40;
                    case 4:
                        return 50;
                    default:
                        throw new Error("еҪ“ max_scale дёә 4 ж—¶пјҢscale еҸӘиғҪдёә 1гҖҒ2гҖҒ3 жҲ– 4");
                }
            case 5:
                switch (parseInt(scale)) {
                    case 1:
                        return 0;
                    case 2:
                        return 35;
                    case 3:
                        return 45;
                    case 4:
                        return 60;
                    case 5:
                        return 100;
                    default:
                        throw new Error("еҪ“ max_scale дёә 5 ж—¶пјҢscale еҸӘиғҪдёә 1гҖҒ2гҖҒ3гҖҒ4 жҲ– 5");
                }
            default:
                throw new Error("max_scale еҸӘиғҪдёә 3гҖҒ4 жҲ– 5");
        }
    }

    // ж•°йҮҸиҫ“е…ҘйӘҢиҜҒ
    function validateQuantity(input) {
        const value = input.value;
        const errorElement = document.getElementById('quantityError');

        // йӘҢиҜҒйқһз©ә
        if (!value) {
            errorElement.textContent = 'ж•°йҮҸдёҚиғҪдёәз©ә';
            errorElement.style.display = 'block';
            return false;
        }

        // йӘҢиҜҒжҳҜеҗҰдёәж•ҙж•°
        if (!/^\d+$/.test(value)) {
            errorElement.textContent = 'иҜ·иҫ“е…Ҙж•ҙж•°';
            errorElement.style.display = 'block';
            return false;
        }

        // йӘҢиҜҒиҢғеӣҙ
        const num = parseInt(value);
        if (num < 1 || num > 9999) {
            errorElement.textContent = 'иҜ·иҫ“е…Ҙ1-9999д№Ӣй—ҙзҡ„ж•°еҖј';
            errorElement.style.display = 'block';
            return false;
        }

        errorElement.style.display = 'none';
        return true;
    }

    // ж јејҸеҢ–ж•°йҮҸпјҲеӨұеҺ»з„ҰзӮ№ж—¶еӨ„зҗҶпјү
    function formatQuantity(input) {
        if (!input.value) {
            input.value = 1;
        } else {
            input.value = Math.max(1, Math.min(9999, parseInt(input.value) || 1));
        }
        validateQuantity(input);
    }

    // иЎЁеҚ•жҸҗдәӨж—¶жңҖз»ҲйӘҢиҜҒ
    function validateForm() {
        return validateQuantity(document.getElementById('quantityInput'));
    }

    // еҲқе§ӢеҢ–зӯүзә§йҖүжӢ©жҢүй’®з»„
    function initLevelGroup(maxScale) {
        var levelGroup = $("#levelGroup");
        levelGroup.empty();

        for (var i = 1; i <= maxScale; i++) {
            var label = $('<label class="btn btn-default">' +
                 i + '</label>');

            if (disease && disease.level && i == disease.level) {
                label.addClass('active');
            }
            levelGroup.append(label);
        }



        // зӣ‘еҗ¬иҜ„е®ҡж ҮеәҰйҖүжӢ©еҸҳеҢ–пјҢиҮӘеҠЁйҖүжӢ©еҜ№еә”зҡ„жҸҸиҝ°
        levelGroup.find('input[type="radio"]').off('change').on('change', function () {
            var selectedScale = $(this).val();
            var $description = $("#description");
            var $option = $description.find('option[value="' + selectedScale + '"]');
            if ($option.length) {
                $description.val(selectedScale).trigger('change');
            }

            // и®Ўз®—е№¶жҳҫзӨәжһ„д»¶жүЈеҲҶ
            var maxScale = $("#maxScale").val();
            if (maxScale && selectedScale) {
                try {
                    var deductPoints = computeDeductPoints(maxScale, selectedScale);
                    $("#deductPoints").val(deductPoints);
                } catch (e) {
                    console.error(e);
                    $("#deductPoints").val('');
                }
            }
        });
    }

    // жӣҙж–°зӯүзә§йҖүжӢ©жҢүй’®з»„
    function updateLevelGroup(diseaseTypeId) {
        if (!diseaseTypeId) {
            initLevelGroup(5); // й»ҳи®ӨжңҖеӨ§еҖјдёә5
            return;
        }

        var selectedDiseaseType = diseaseTypes.find(function (item) {

        });

        if (selectedDiseaseType && selectedDiseaseType.maxScale) {
            initLevelGroup(selectedDiseaseType.maxScale);
        } else {
            initLevelGroup(5); // еҰӮжһңжІЎжңүжүҫеҲ°еҜ№еә”зҡ„maxScaleпјҢдҪҝз”Ёй»ҳи®ӨеҖј5

    // и§Јжһҗеӯ—з¬ҰдёІд»ҘиҺ·еҸ–дёӢжӢүжЎҶзҡ„йҖүйЎ№
    function parseProps(props) {
        var parsedProps = {};
        if (!props) return parsedProps;

        var pairs = props.split('&&');
        for (var i = 0; i < pairs.length; i++) {
            var pair = pairs[i].split(':=');
            if (pair.length < 2) continue;

            var key = pair[0];
            var values = pair[1].split('гҖҒ');
            parsedProps[key] = values.map(function (value) {
                return {id: value, name: value};
            });
        }
        return parsedProps;
    }

        // жё…з©әinputпјҢд»ҘдҫҝеҸҜд»ҘйҮҚеӨҚйҖүжӢ©еҗҢдёҖж–Үд»¶

    // дҝ®ж”№иЎЁеҚ•жҸҗдәӨеӨ„зҗҶ
    function submitHandler() {
        if ($.validate.form() && validateForm()) {
            var formData = new FormData($("#form-disease-edit")[0]);

            // еӨ„зҗҶиҮӘе®ҡд№үз—…е®ізұ»еһӢ
            var diseaseTypeText = $("#diseaseTypeId option:selected").text().trim();
            if (diseaseTypeText === "е…¶д»–" || diseaseTypeText === "е…¶е®ғ") {
                formData.append("customDiseaseType", $("#customDiseaseType").val());
            }

            // еӨ„зҗҶиҮӘе®ҡд№үз—…е®ідҪҚзҪ®
            var positionText = $("#position option:selected").text().trim();
            if (positionText === "е…¶д»–" || positionText === "е…¶е®ғ") {
                formData.set("position", $("#customPosition").val());
            } else {
                formData.set("position", positionText);
            }

            // зЎ®дҝқdeductPointsжҳҜж•ҙж•°
            var deductPoints = $("#deductPoints").val();
            formData.set("deductPoints", deductPoints ? parseInt(deductPoints) : 0);

            // зЎ®дҝқжҜҸдёӘdiseaseDetailйғҪжңүdiseaseId
            var diseaseId = $("input[name='id']").val();
            if (diseaseId) {
                // жҹҘжүҫжүҖжңүdiseaseDetailиЎЁеҚ•еӯ—ж®ө
                var detailElements = $("[name^='diseaseDetails[']");
                var detailsMap = {};

                // жҢүзҙўеј•з»„з»Үж•°жҚ®
                detailElements.each(function () {
                    var name = $(this).attr('name');
                    var matches = name.match(/diseaseDetails\[(\d+)\]\.(.+)/);
                    if (matches && matches.length === 3) {
                        var index = matches[1];
                        var field = matches[2];

                        if (!detailsMap[index]) {
                            detailsMap[index] = {};
                        }

                        var value = $(this).val();
                        detailsMap[index][field] = value;

                        // дёәжҜҸдёӘdetailж·»еҠ diseaseId
                        detailsMap[index]['diseaseId'] = diseaseId;
                    }
                });

                // жіЁж„ҸпјҡеҸӮиҖғйқўдҪҚзҪ®еҖје·Із»ҸеңЁFormDataж”¶йӣҶеҗҺзӣҙжҺҘеӨ„зҗҶдәҶпјҢиҝҷйҮҢдёҚйңҖиҰҒйҮҚеӨҚеӨ„зҗҶ

                // жё…йҷӨеҺҹжңүзҡ„diseaseDetailsж•°жҚ®
                detailElements.each(function () {
                    formData.delete($(this).attr('name'));
                });

                // йҮҚж–°ж·»еҠ еёҰжңүdiseaseIdзҡ„ж•°жҚ®
                for (var index in detailsMap) {
                    var detail = detailsMap[index];
                    for (var field in detail) {
                        formData.append(`diseaseDetails[${index}].${field}`, detail[field]);
                    }
                }

            }

            // ж·»еҠ жүҖжңүйў„и§ҲеҢәеҹҹзҡ„ж–Үд»¶еҲ°FormData
            globalFiles.forEach(function (file, index) {
                formData.append('files', file);
            });

            // ж·»еҠ е·Іжңүйҷ„д»¶зҡ„IDеҲ—иЎЁ
            var existingAttachmentIds = [];
            $('input[name^="attachments["][name$=".id"]').each(function () {
                var id = $(this).val();
                if (id && !existingAttachmentIds.includes(id)) {
                    existingAttachmentIds.push(id);
                }
            });

            // е°Ҷйҷ„д»¶IDж•°з»„иҪ¬жҚўдёәйҖ—еҸ·еҲҶйҡ”зҡ„еӯ—з¬ҰдёІ
            if (existingAttachmentIds.length > 0) {
                formData.append('existingAttachmentIds', existingAttachmentIds.join(','));
            }

            var quantity = $("#quantityInput").val();

            // иҺ·еҸ–еҪ“еүҚйҖүдёӯзҡ„з—…е®ізұ»еһӢ
            var selectedDiseaseTypeId = $("#diseaseTypeId").val();
            var selectedDiseaseType = selectedDiseaseTypeId ? diseaseTypes.find(function (item) {
                return item.id == selectedDiseaseTypeId;
            }) : null;

            // иҺ·еҸ–thresholdеҖјпјҢй»ҳи®Өдёә10
            var threshold = (selectedDiseaseType && selectedDiseaseType.threshold) ? selectedDiseaseType.threshold : 10;

            // зӣҙжҺҘеӨ„зҗҶеҸӮиҖғйқўдҪҚзҪ®еҖј
            if (quantity >= threshold) {
                // еҚ•з—…е®іжғ…еҶө
                var ref1Select = $("#reference1Location");
                var ref2Select = $("#reference2Location");

                var ref1Value = ref1Select.val();
                var ref2Value = ref2Select.val();

                // еҰӮжһңйҖүжӢ©дәҶ"е…¶д»–"пјҢдҪҝз”ЁиҮӘе®ҡд№үиҫ“е…ҘжЎҶзҡ„еҖј
                if (ref1Value === "е…¶д»–") {
                    ref1Value = $("#reference1LocationCustom").val();
                }
                if (ref2Value === "е…¶д»–") {
                    ref2Value = $("#reference2LocationCustom").val();
                }

                // зӣҙжҺҘи®ҫзҪ®еҲ°FormDataдёӯ
                if (ref1Value && ref1Value !== "") {
                    formData.set("diseaseDetails[0].reference1Location", ref1Value);
                    console.log("зӣҙжҺҘи®ҫзҪ®еҚ•з—…е®іеҸӮиҖғйқў1дҪҚзҪ®еҖј:", ref1Value);
                }
                if (ref2Value && ref2Value !== "") {
                    formData.set("diseaseDetails[0].reference2Location", ref2Value);
                    console.log("зӣҙжҺҘи®ҫзҪ®еҚ•з—…е®іеҸӮиҖғйқў2дҪҚзҪ®еҖј:", ref2Value);
                }
            } else {
                // еӨҡз—…е®іжғ…еҶө
                for (var i = 0; i < quantity; i++) {
                    // е…Ҳжё…йҷӨеҪ“еүҚзҙўеј•зҡ„ж—§еҖј
                    formData.delete("diseaseDetails[" + i + "].reference1Location");
                    formData.delete("diseaseDetails[" + i + "].reference2Location");

                    var ref1Select = $("#reference1Location_" + i);
                    var ref2Select = $("#reference2Location_" + i);

                    var ref1Value = ref1Select.val();
                    var ref2Value = ref2Select.val();

                    // еҰӮжһңйҖүжӢ©дәҶ"е…¶д»–"пјҢдҪҝз”ЁиҮӘе®ҡд№үиҫ“е…ҘжЎҶзҡ„еҖј
                    if (ref1Value === "е…¶д»–") {
                        ref1Value = $("#reference1LocationCustom_" + i).val();
                    }
                    if (ref2Value === "е…¶д»–") {
                        ref2Value = $("#reference2LocationCustom_" + i).val();
                    }

                    // и®ҫзҪ®ж–°еҖјеҲ°FormDataдёӯ
                    if (ref1Value && ref1Value !== "") {
                        formData.set("diseaseDetails[" + i + "].reference1Location", ref1Value);
                    }
                    if (ref2Value && ref2Value !== "") {
                        formData.set("diseaseDetails[" + i + "].reference2Location", ref2Value);
                    }
                }
            }

            $.modal.loading("жӯЈеңЁжҸҗдәӨж•°жҚ®пјҢиҜ·зЁҚеҖҷ...");
            $.ajax({
                url: prefix + "/edit",
                type: 'POST',
                data: formData,
                contentType: false,
                processData: false,
                success: function (response) {
                    $.modal.closeLoading();
                    if (response.code === 0) {
                        $.modal.msgSuccess("дҝқеӯҳжҲҗеҠҹ");
                        localStorage.setItem("refreshDiseaseTable", Date.now()); // и®ҫзҪ®дёҖдёӘеҲ·ж–°ж Үеҝ—пјҲйҷ„еёҰж—¶й—ҙйҒҝе…Қзј“еӯҳпјү
                        $.modal.closeTab();
                        parent.$.table.refresh();
                    } else {
                        $.modal.alertError(response.msg);
                    }
                },
                error: function () {
                    $.modal.closeLoading();
                    $.modal.alertError("дҝқеӯҳеӨұиҙҘпјҢиҜ·зЁҚеҗҺеҶҚиҜ•");
                }
            });
        }
    }

    // иҺ·еҸ–е·ІдёҠдј зҡ„йҷ„д»¶еҲ—иЎЁ
    function loadExistingAttachments() {
        var diseaseId = $("input[name='id']").val();

            $.ajax({

                success: function (response) {
                    if (response.code === 0 && response.data) {
                        var previewContainer = $("#filePreview");
                        // жё…з©әзҺ°жңүйў„и§Ҳ
                        previewContainer.empty();

                        // жҳҫзӨәе·Іжңүйҷ„д»¶
                        var index = 0;
                        response.data.forEach(function (attachment) {

                            var thumbnail = $('<div class="thumbnail"></div>');

                            if (attachment.isImage) {

                                thumbnail.append(
                                    '<div class="preview-image">' +
                                    '<a href="javascript:void(0);" class="preview-image">' +

                                    'title="' + attachment.fileName + '">' +

                                    '</div>'
                                );
                            } else {
                                // ж–Үд»¶еӣҫж ҮпјҢзӮ№еҮ»еҸҜдёӢиҪҪ
                                thumbnail.append(
                                    '<a href="javascript:void(0);" onclick="downloadFile(\'' + attachment.url + '\', \'' + attachment.fileName + '\')" ' +
                                    'style="text-decoration:none;color:inherit;" title="зӮ№еҮ»дёӢиҪҪпјҡ' + attachment.fileName + '">' +
                                    '<div class="preview-file text-center" style="cursor:pointer;">' +
                                    '<i class="fa fa-file fa-3x" style="margin: 20px;"></i>' +
                                    '<p style="word-break: break-all;">' + attachment.fileName + '</p>' +
                                    '</div>' +
                                    '</a>'
                                );
                            }

                            // ж·»еҠ йҡҗи—Ҹеӯ—ж®өдҝқеӯҳйҷ„д»¶дҝЎжҒҜ
                            thumbnail.append(
                                '<input type="hidden" name="attachments[' + index + '].id" value="' + attachment.id + '">' +
                                '<input type="hidden" name="attachments[' + index + '].fileName" value="' + attachment.fileName + '">' +
                                '<input type="hidden" name="attachments[' + index + '].url" value="' + attachment.url + '">' +
                                '<input type="hidden" name="attachments[' + index + '].isImage" value="' + attachment.isImage + '">'

    // ж·»еҠ дёӢиҪҪж–Үд»¶зҡ„еҮҪж•°
    function downloadFile(url, fileName) {
        // еҲӣе»әдёҖдёӘXMLHttpRequestеҜ№иұЎ
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'blob';

        xhr.onload = function () {
            if (xhr.status === 200) {
                // еҲӣе»әblobй“ҫжҺҘ
                var blob = new Blob([xhr.response], {type: xhr.getResponseHeader('Content-Type')});
                var link = document.createElement('a');

                // ж·»еҠ fileNameеҸӮж•°еҲ°URL
                var downloadUrl = url;
                if (url.indexOf('?') === -1) {
                    downloadUrl += '?fileName=' + encodeURIComponent(fileName);
                } else {
                    downloadUrl += '&fileName=' + encodeURIComponent(fileName);
                }

                // и®ҫзҪ®дёӢиҪҪй“ҫжҺҘе’Ңж–Үд»¶еҗҚ
                link.href = window.URL.createObjectURL(blob);
                link.download = fileName;

                // и§ҰеҸ‘дёӢиҪҪ
                document.body.appendChild(link);
                link.click();

                // жё…зҗҶ
                document.body.removeChild(link);
                window.URL.revokeObjectURL(link.href);
            }
        };

        // еҸ‘йҖҒиҜ·жұӮ
        xhr.send();
    }

    // ж·»еҠ иҫ…еҠ©еҮҪж•°пјҡе°ҶDataURIиҪ¬жҚўдёәBlob
    function dataURItoBlob(dataURI) {
        var byteString = atob(dataURI.split(',')[1]);
        var mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
        var ab = new ArrayBuffer(byteString.length);
        var ia = new Uint8Array(ab);
        for (var i = 0; i < byteString.length; i++) {
            ia[i] = byteString.charCodeAt(i);
        }
        return new Blob([ab], {type: mimeString});
    }

    // зӣ‘еҗ¬дҪҚзҪ®йҖүжӢ©еҸҳеҢ–пјҢеЎ«е……еҸӮиҖғйқўдёӢжӢүжЎҶ
    $("#position").on('change', function () {
        var selectedId = $(this).val();
        if (selectedId) {
            var selectedPosition = positionObjects.find(function (item) {
                return item.id == selectedId;
            });

            if (selectedPosition && selectedPosition.props) {
                var parsedProps = parseProps(selectedPosition.props);
                var quantity = $("#quantityInput").val();

                // дҪҝз”Ёж–°зҡ„еЎ«е……еҮҪж•°
                fillReferenceDropdowns(parsedProps, quantity);

                // иҺ·еҸ–еҪ“еүҚйҖүдёӯзҡ„з—…е®ізұ»еһӢ
                var selectedDiseaseTypeId = $("#diseaseTypeId").val();
                var selectedDiseaseType = selectedDiseaseTypeId ? diseaseTypes.find(function (item) {
                    return item.id == selectedDiseaseTypeId;
                }) : null;

                // иҺ·еҸ–thresholdеҖјпјҢй»ҳи®Өдёә10
                var threshold = (selectedDiseaseType && selectedDiseaseType.threshold) ? selectedDiseaseType.threshold : 10;

                // еҸӘеңЁж–°еўһжЁЎејҸдёӢи®ҫзҪ®й»ҳи®ӨйҖүдёӯеҖјпјҢзј–иҫ‘жЁЎејҸдёӢдҝқжҢҒеҺҹжңүеӣһжҳҫеҖј
                if (!diseaseId) {
                    if (quantity >= threshold) {
                        var ref1Select = $("#reference1Location");
                        var ref2Select = $("#reference2Location");

                        try {
                            if (parsedProps['ref1'] && parsedProps['ref1'][0]) {
                                ref1Select.val(parsedProps['ref1'][0].id).trigger('change'); // й»ҳи®ӨйҖүдёӯз¬¬дёҖдёӘйҖүйЎ№
                            }
                            if (parsedProps['ref2'] && parsedProps['ref2'][0]) {
                                ref2Select.val(parsedProps['ref2'][0].id).trigger('change'); // й»ҳи®ӨйҖүдёӯз¬¬дёҖдёӘйҖүйЎ№
                            }
                        } catch (e) {
                            console.log(e);
                        }
                    } else {
                        // и®ҫзҪ®й»ҳи®ӨйҖүдёӯеҖј
                        for (var i = 0; i < quantity; i++) {
                            var ref1Select = $(`#reference1Location_${i}`);
                            var ref2Select = $(`#reference2Location_${i}`);
                            try {
                                if (parsedProps['ref1'] && parsedProps['ref1'][0]) {
                                    ref1Select.val(parsedProps['ref1'][0].id).trigger('change'); // й»ҳи®ӨйҖүдёӯз¬¬дёҖдёӘйҖүйЎ№
                                }
                                if (parsedProps['ref2'] && parsedProps['ref2'][0]) {
                                    ref2Select.val(parsedProps['ref2'][0].id).trigger('change'); // й»ҳи®ӨйҖүдёӯз¬¬дёҖдёӘйҖүйЎ№
                                }
                            } catch (e) {
                                console.log(e);
                            }
                        }
                    }
                }
            }
        }
    });

    // жҳҫзӨәеҪ“еүҚеӣҫзүҮе№¶жҺ§еҲ¶жҢүй’®жҳҫзӨә
    function showPreviewImage() {
        if (previewImageList.length === 0) return;

        // зЎ®дҝқзҙўеј•еңЁжңүж•ҲиҢғеӣҙеҶ…
        if (previewImageIndex < 0) previewImageIndex = 0;
        if (previewImageIndex >= previewImageList.length) previewImageIndex = previewImageList.length - 1;

        var item = previewImageList[previewImageIndex];

        // и®ҫзҪ®еӣҫзүҮжәҗ
        $('#previewImage').attr('src', item.src);

        // и®ҫзҪ®дёӢиҪҪй“ҫжҺҘ
        var fileName = item.fileName || 'image.jpg';
        $('#downloadImageLink').attr('href', item.src).attr('download', fileName);

        // и®ҫзҪ®еә•йғЁдҝЎжҒҜ
        $('#previewFileName').text(item.fileName || '');
        $('#previewIndex').text((previewImageIndex + 1) + ' of ' + previewImageList.length);

        // жҺ§еҲ¶е·ҰеҸіжҢүй’®зҡ„еҗҜз”Ё/зҰҒз”ЁзҠ¶жҖҒпјҢдҪҶе§Ӣз»ҲдҝқжҢҒжҳҫзӨә
        if (previewImageIndex <= 0) {
            $('#prevImage').prop('disabled', true).css('opacity', '0.3');
        } else {
            $('#prevImage').prop('disabled', false).css('opacity', '1');
        }

        if (previewImageIndex >= previewImageList.length - 1) {
            $('#nextImage').prop('disabled', true).css('opacity', '0.3');
        } else {
            $('#nextImage').prop('disabled', false).css('opacity', '1');
        }
    }

    // зЎ®дҝқеңЁж–ҮжЎЈеҠ иҪҪеҗҺжү§иЎҢ
    $(document).ready(function () {
        // е·ҰеҸіжҢүй’®зӮ№еҮ»дәӢд»¶
        $('#prevImage').on('click', function (e) {
            e.stopPropagation();
            if (previewImageIndex > 0) {
                previewImageIndex--;
                showPreviewImage();
                console.log('еҗ‘е·ҰеҲҮжҚўпјҢеҪ“еүҚзҙўеј•: ' + previewImageIndex);
            }
        });

        $('#nextImage').on('click', function (e) {
            e.stopPropagation();
            if (previewImageIndex < previewImageList.length - 1) {
                previewImageIndex++;
                showPreviewImage();
                console.log('еҗ‘еҸіеҲҮжҚўпјҢеҪ“еүҚзҙўеј•: ' + previewImageIndex);
            }
        });

        // дёӢиҪҪжҢүй’®зӮ№еҮ»дәӢд»¶
        $('#downloadButton').on('click', function () {
            var item = previewImageList[previewImageIndex];
            if (item && item.src) {
                downloadFile(item.src, item.fileName || 'image.jpg');
            }
        });

        // зӮ№еҮ»еӣҫзүҮдёӢиҪҪеӨ„зҗҶ
        $('#downloadImageLink').on('click', function (e) {
            var item = previewImageList[previewImageIndex];
            if (item && item.src) {
                e.preventDefault(); // йҳІжӯўй»ҳи®ӨиЎҢдёә
                downloadFile(item.src, item.fileName || 'image.jpg');
            }
        });

        // й”®зӣҳе·ҰеҸій”®жҺ§еҲ¶
        $(document).on('keydown', function (e) {
            if ($('#imagePreviewModal').hasClass('show')) {
                if (e.keyCode === 37) { // е·Ұз®ӯеӨҙ
                    $('#prevImage').click();
                } else if (e.keyCode === 39) { // еҸіз®ӯеӨҙ
                    $('#nextImage').click();
                } else if (e.keyCode === 27) { // ESCй”®
                    $('#imagePreviewModal').modal('hide');
                }
            }
        });

        // е…ій—ӯеј№зӘ—ж—¶жё…з©ә
        $('#imagePreviewModal').on('hidden.bs.modal', function () {
            previewImageList = [];
            previewImageIndex = 0;
            $('#previewImage').attr('src', '');
            $('#previewFileName').text('');
            $('#previewIndex').text('');
        });
    });
</script>
