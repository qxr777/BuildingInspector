<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('批量导入桥梁')" />
    <style>
        .import-guide {
            margin-top: 5px;
            padding: 12px;
            border: 1px solid #d9e7f7;
            border-radius: 4px;
            background: #f7fbff;
        }

        .import-guide-title {
            margin-bottom: 10px;
            color: #1c4f80;
            font-weight: 600;
        }

        .import-guide-link {
            display: inline-block;
        }

        .import-guide-image {
            display: block;
            width: 360px;
            max-width: 100%;
            height: auto;
            border: 1px solid #d5d5d5;
            cursor: zoom-in;
        }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-import-building">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">Excel文件：</label>
            <div class="col-sm-8">
                <input type="file" name="file" class="form-control" accept=".xlsx" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">操作说明：</label>
            <div class="col-sm-8">
                <span class="help-block">
                    <i class="fa fa-info-circle"></i>
                    仅支持 .xlsx 文件；导入失败时本次新增数据会全部回滚。
                </span>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-12">
                <div class="import-guide">
                    <div class="import-guide-title">
                        <i class="fa fa-info-circle"></i>
                        填写前请核对下方规则，重点检查桥梁名称、父桥名称、片区、线路和桥梁类型。
                        点击缩略图可查看完整说明。
                    </div>
                    <a class="import-guide-link"
                       th:href="@{/img/building/batch-import-guide.png}"
                       target="_blank"
                       title="点击查看桥梁批量上传填写说明原图">
                        <img class="import-guide-image"
                             th:src="@{/img/building/batch-import-guide.png}"
                             alt="桥梁批量上传填写说明">
                    </a>
                </div>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "biz/building";

    $.validator.addMethod("xlsxFile", function(value, element) {
        return this.optional(element) || /\.xlsx$/i.test(value);
    }, "请选择 .xlsx 格式文件");

    $(function() {
        $("#form-import-building").validate({
            rules: {
                file: {
                    required: true,
                    xlsxFile: true
                }
            },
            errorPlacement: function(error, element) {
                error.insertAfter(element.parent());
            }
        });
    });

    function submitHandler(successCallback) {
        if (!$("#form-import-building").valid()) {
            return;
        }

        var fileInput = $('input[name="file"]')[0];
        if (!fileInput.files.length) {
            $.modal.alertWarning("请选择要导入的Excel文件");
            return;
        }

        var formData = new FormData();
        formData.append("file", fileInput.files[0]);

        $.modal.loading("正在导入，请稍候...");
        $.ajax({
            url: prefix + "/batchAddBuilding",
            type: "POST",
            data: formData,
            cache: false,
            contentType: false,
            processData: false,
            success: function(result) {
                $.modal.closeLoading();
                if (result.code == web_status.SUCCESS) {
                    $.modal.msgSuccess(result.msg);
                    $.modal.close();
                    if (typeof successCallback === "function") {
                        successCallback();
                    }
                } else {
                    $.modal.alertError(result.msg);
                }
            },
            error: function(xhr) {
                $.modal.closeLoading();
                var message = xhr.responseJSON && xhr.responseJSON.msg
                    ? xhr.responseJSON.msg
                    : "导入失败，请检查Excel内容后重试";
                $.modal.alertError(message);
            }
        });
    }
</script>
</body>
</html>
