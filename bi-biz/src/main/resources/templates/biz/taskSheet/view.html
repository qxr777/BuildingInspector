<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('查看表格数据')"/>
    <style>
        #jsonContent {
            min-height: 400px;
            max-height: 560px;
            overflow: auto;
            background: #f8f8f8;
            border: 1px solid #e5e6e7;
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content">
    <div class="ibox-title">
        <h5 th:text="'表格：' + ${sheetName}"></h5>
    </div>
    <div class="ibox-content">
        <pre id="jsonContent">正在加载...</pre>
    </div>
</div>
<th:block th:include="include :: footer"/>
<script th:inline="javascript">
    var taskId = [[${taskId}]];
    var type = [[${type}]];
    var sheetPrefix = ctx + "biz/taskSheet";

    $(function () {
        $.ajax({
            type: "GET",
            url: sheetPrefix + "/content/" + taskId + "/" + type,
            success: function (result) {
                if (result.code === 0) {
                    $("#jsonContent").text(result.content || "");
                } else {
                    $("#jsonContent").text(result.msg || "加载失败");
                }
            },
            error: function () {
                $("#jsonContent").text("加载失败，请稍后重试");
            }
        });
    });
</script>
</body>
</html>
